name: Android Build & Submit

on:
  push:
    tags:
      - 'v*.*.*'        # Produção
  push:
    branches:
      - 'release/*'     # Internal testing

jobs:
  build-android:
    name: Build & Submit Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Install dependencies
        run: npm ci

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode \
            > android/app/shaikron-release.jks

      - name: Build AAB
        env:
          SHAIKRON_UPLOAD_STORE_FILE: shaikron-release.jks
          SHAIKRON_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SHAIKRON_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          SHAIKRON_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.scheffelt.shaikron
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'internal' }}
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Clean up Keystore
        if: always()
        run: rm -f android/app/shaikron-release.jks

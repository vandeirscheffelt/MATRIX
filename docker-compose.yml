services:

  # ── API Fastify ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: matrix-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - apps/api/.env.production
    networks:
      - matrix

  # ── Web (catálogo público) ───────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: matrix-web
    restart: unless-stopped
    ports:
      - "3003:3000"
    env_file:
      - apps/web/.env.production
    networks:
      - matrix

  # ── Calo Admin ───────────────────────────────────────────────────────────────
  calo-admin:
    build:
      context: .
      dockerfile: apps/calo-admin/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: https://tbapcaxbawruijrigafn.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRiYXBjYXhiYXdydWlqcmlnYWZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3MTg3NTEsImV4cCI6MjA4NTI5NDc1MX0.bocnd-c7kiyaSYrqr6SD6908cQ399X52ge_FQHuLy9I

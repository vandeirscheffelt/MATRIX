server {
    listen 80;
    server_name app.shaikron.scheffelt.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.shaikron.scheffelt.xyz;

    # Certs copiados pelo deploy-shaikron-web.sh a partir do Let's Encrypt
    ssl_certificate     /usr/local/openresty/nginx/conf/default/certs/shaikron-fullchain.pem;
    ssl_certificate_key /usr/local/openresty/nginx/conf/default/certs/shaikron-privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

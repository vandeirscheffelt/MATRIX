version: '3.9'

services:
  shaikron-api:
    image: shaikron-api:latest
    container_name: shaikron-api
    restart: unless-stopped
    build:
      context: ../../../          # raiz do monorepo
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    env_file:
      - /var/www/matrix/.env      # carrega o .env da VPS (nunca commitar)
    networks:
      - shaikron-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  shaikron-net:
    driver: bridge

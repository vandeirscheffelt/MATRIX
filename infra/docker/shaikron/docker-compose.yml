version: '3.9'

services:
  shaikron-api:
    image: shaikron-api:latest
    container_name: shaikron-api
    restart: always
    # Graceful shutdown: espera 30s para requests em andamento finalizarem antes de matar o container
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    build:
      context: ../../../          # raiz do monorepo
      dockerfile: apps/api/Dockerfile
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: 3004
    env_file:
      - /var/www/matrix/.env      # carrega o .env da VPS (nunca commitar)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
